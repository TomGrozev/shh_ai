name: Performance Tests

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  perf-test:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "26"

      - name: Cache Mix dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Download baseline from master
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            // Find the latest successful workflow run on master for this workflow
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'performance.yml',
              branch: 'master',
              status: 'success',
              per_page: 1
            });

            if (runs.data.workflow_runs.length === 0) {
              console.log('No successful workflow runs found on master branch.');
              return;
            }

            const runId = runs.data.workflow_runs[0].id;
            console.log(`Found successful run on master: ${runId}`);

            // List artifacts from that run
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId
            });

            const baselineArtifact = artifacts.data.artifacts.find(
              a => a.name.startsWith('performance-baseline-')
            );

            if (!baselineArtifact) {
              console.log('No baseline artifact found in the latest master run.');
              return;
            }

            console.log(`Found baseline artifact: ${baselineArtifact.name} (id: ${baselineArtifact.id})`);

            // Download the artifact
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: baselineArtifact.id,
              archive_format: 'zip'
            });

            const fs = require('fs');
            const path = require('path');

            // Save the zip file
            const zipPath = path.join(process.env.GITHUB_WORKSPACE, 'baseline.zip');
            fs.writeFileSync(zipPath, Buffer.from(download.data));
            console.log(`Downloaded artifact to ${zipPath}`);

            // Extract the zip file
            const { execSync } = require('child_process');
            const extractDir = path.join(process.env.GITHUB_WORKSPACE, '.perf', 'baselines');
            fs.mkdirSync(extractDir, { recursive: true });
            execSync(`unzip -o "${zipPath}" -d "${extractDir}"`);
            console.log(`Extracted baseline to ${extractDir}`);

      - name: Run performance tests
        id: perf
        run: |
          mkdir -p .perf/baselines
          mix test.performance 2>&1 | tee perf_output.txt
        continue-on-error: true

      - name: Extract markdown table
        if: github.event_name == 'pull_request' && steps.perf.outcome != 'skipped'
        id: extract
        run: |
          # Extract the markdown table from the performance test output.
          # The table starts with "| Benchmark |" and ends at the last table row.
          awk '/\| Benchmark \|/{found=1} found{print} /^$/{if(found) exit}' perf_output.txt > table.txt || true

          # If the table is empty, create a fallback message
          if [ ! -s table.txt ]; then
            echo "No performance table found in output." > table.txt
          fi

          # Store the table in an environment variable for the next step
          {
            echo 'TABLE<<EOF'
            cat table.txt
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.perf.outcome != 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const table = process.env.TABLE || 'No performance results available.';
            const body = `## Performance comparison results

            ${table}

            _Generated by the Performance Tests workflow._
            `;

            // Find existing comment from this workflow
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Performance comparison results')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
              console.log('Updated existing performance comment.');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
              console.log('Posted new performance comment.');
            }

      - name: Check exit code
        if: steps.perf.outcome == 'failure'
        run: exit 1

      - name: Upload baseline artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline-${{ github.sha }}
          path: .perf/baselines/
          retention-days: 90
